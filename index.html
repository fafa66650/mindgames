const APP = document.getElementById('app');
const RAIN = document.getElementById('rain');
const CTX = RAIN.getContext('2d');

let audioCtx = null, ambienceNode = null;

function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(freq=440,dur=.15,type='sine',vol=.03){
  try{
    const ctx = initAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  }catch(e){}
}
function playOk(){ beep(760,.12,'triangle',.03); setTimeout(()=>beep(980,.12,'triangle',.02),90); }
function playBad(){ beep(180,.18,'sawtooth',.035); setTimeout(()=>beep(130,.18,'sawtooth',.03),100); }
function playTension(){ beep(320,.08,'square',.016); }
function toggleAmbience(on=true){
  try{
    const ctx = initAudio();
    if(ambienceNode){ ambienceNode.osc.stop(); ambienceNode = null; }
    if(!on) return;
    const osc = ctx.createOscillator(), gain = ctx.createGain(), filter = ctx.createBiquadFilter();
    osc.type = 'sawtooth'; osc.frequency.value = 58;
    filter.type = 'lowpass'; filter.frequency.value = 240;
    gain.gain.value = .008;
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.start(); ambienceNode = {osc,gain};
  }catch(e){}
}
function norm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'').trim(); }

function setTheme(){ document.body.classList.remove('night','jungle','lab'); document.body.classList.add(GAMES[state.game].body); }
function teamDistribution(total,teams){ const base=Math.floor(total/teams),rest=total%teams; if(rest===0) return `${teams} équipes de ${base}`; return `${rest} équipes de ${base+1} · ${teams-rest} équipes de ${base}`; }
function chooseChallenges(){
  const bank = GAMES[state.game].bank;
  const order = {facile:['facile'], moyen:['facile','moyen'], difficile:['moyen','difficile'], extreme:['difficile','extreme']};
  let count = state.duration <= 1800 ? 4 : state.duration <= 2700 ? 5 : state.duration <= 3600 ? 6 : state.duration <= 5400 ? 7 : 8;
  if(state.publicType === 'enfants') count = Math.max(4, count - 1);
  if(state.publicType === 'adultes' && state.difficulty === 'extreme') count = Math.min(8, count + 1);
  let arr = []; (order[state.difficulty] || ['moyen']).forEach(k => arr = arr.concat(bank[k] || []));
  return arr.slice(0, count);
}

function startMission(){

    if(state.time === 45) playTension();

      {txt:'🎁 BONUS : +100 points', fn:()=>state.score += 100},
      {txt:'💣 SABOTAGE : -80 points', fn:()=>state.score = Math.max(0, state.score - 80)},

      {txt:'⚠️ FAUX INDICE : cette manche contient une évidence piégée', fn:()=>{}},

    const ev = events[Math.floor(Math.random()*events.length)];

}

  } else {
    ok = c.validator(document.getElementById('freeAnswer').value);
  }
  const shell = document.querySelector('.game-shell');
  if(ok){
    state.score += 120; state.fragments.push(c.fragment); playOk();
    shell.classList.remove('flash-bad'); shell.classList.add('flash-good');
    document.getElementById('feedback').innerHTML = `<div class="feedback ok"><strong>✅ Bonne réponse.</strong><br>${c.exp}<br><br><strong>Fragment obtenu : ${c.fragment}</strong></div><div class="btns"><button class="btn-main" onclick="nextChallenge()">DÉFI SUIVANT</button></div>`;
  } else {
    state.attempts++; playBad();
    shell.classList.remove('flash-good'); shell.classList.add('flash-bad');
    if(state.attempts < 2){
      state.score = Math.max(0, state.score - 40);
      document.getElementById('feedback').innerHTML = `<div class="feedback bad"><strong>❌ Mauvaise piste.</strong><br>Tu as encore une chance. Relis la scène, l’indice discret, et corrige ta lecture.<br><br><span class="small">Pénalité : -40 points.</span></div>`;
    } else {
      state.score = Math.max(0, state.score - 80);
      document.getElementById('feedback').innerHTML = `<div class="feedback bad"><strong>💥 Défi perdu.</strong><br>${c.exp}<br><br><span class="small">Vous passez au défi suivant. Pas de retour arrière.</span></div><div class="btns"><button class="btn-main" onclick="nextChallenge()">DÉFI SUIVANT</button></div>`;
    }
  }
}
function nextChallenge(){ state.index++; renderChallenge(); }
function renderMetaFinal(){
  const g = GAMES[state.game];
  const fragments = state.fragments.join(' · ') || 'aucun';
  APP.innerHTML = `
    <section class="game-shell fadein glow">
      <div class="hud">
        <div class="hud-left"><div class="badge points">Score : ${state.score}</div><div class="badge meta">Méta final</div><div class="badge meta">Fragments : ${state.fragments.length}</div></div>
        <div class="hud-right"><div id="timerBadge" class="badge timer ${timerColor()}">⏱ ${fmt(state.time)}</div></div>
      </div>
      <div class="turn glitch" data-text="RÉSOLUTION FINALE">💣 RÉSOLUTION FINALE</div>
      <div class="story">Fragments récupérés : <strong>${fragments}</strong><br><br>La dernière étape te force à relire le parcours et à désigner la piste la plus stable de l’univers.</div>
      <div class="story"><strong>${g.finalPrompt}</strong></div>
      <div class="choice-grid">
        ${g.finalChoices.map((choice,i)=>`<button class="choice" onclick="pickMeta(${i}, this)">${choice}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </section>
    <div class="validate-bar"><button class="validate-btn" onclick="validateMeta()">VALIDER LE VERDICT FINAL</button></div>`;
  state.metaPick = null;
}
function pickMeta(i,el){ document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); state.metaPick = i; }
function validateMeta(){
  const answer = GAMES[state.game].finalAnswer;
  if(state.metaPick === null){ document.getElementById('feedback').innerHTML = `<div class="feedback bad">Choisis d’abord une piste.</div>`; return; }
  if(state.metaPick === answer){
    state.score += 180; playOk();
    document.getElementById('feedback').innerHTML = `<div class="feedback ok"><strong>✅ Verdict validé.</strong><br>Vous avez choisi la piste la plus solide pour fermer l’univers.</div><div class="btns"><button class="btn-main" onclick="finishMission(false)">VOIR LA FIN DE MISSION</button></div>`;
  } else {
    state.score = Math.max(0, state.score - 120); playBad();
    document.getElementById('feedback').innerHTML = `<div class="feedback bad"><strong>❌ Verdict erroné.</strong><br>La meilleure piste finale n’était pas celle-ci. Vous pouvez quand même clôturer la mission avec le score actuel.</div><div class="btns"><button class="btn-main" onclick="finishMission(false)">VOIR LA FIN DE MISSION</button></div>`;
  }
}
function finishMission(timeout){
  clearInterval(state.timer); toggleAmbience(false);
  const mention = timeout ? 'Temps écoulé' : state.score >= 1800 ? 'Domination totale' : state.score >= 1500 ? 'Percée magistrale' : state.score >= 1200 ? 'Mission tenue' : 'Survie sous pression';
  const icon = timeout ? '⏱' : state.score >= 1800 ? '👑' : state.score >= 1500 ? '🏆' : state.score >= 1200 ? '⚡' : '🌧️';
  APP.innerHTML = `
    <section class="final-wrap fadein">
      <div class="final-card glow">
        <div class="big-score">${state.score} pts</div>
        <p><strong>${icon} ${state.teamName || 'Votre équipe'}</strong> — ${mention}</p>
        <p>Pastilles utilisées : ${state.hints}</p>
        <p>${timeout ? 'Le chrono a refermé la mission avant la résolution complète.' : 'La mission se ferme dans un halo de néon, de bruit parasite et de pluie. Vous avez tenu jusqu’au bout, encaissé les faux indices et trouvé une piste plus stable que les autres.'}</p>
      </div>
      <div class="goal-grid">
        <div class="goal"><h4>Ce qui a compté</h4><div>Le recoupement d’indices, la lecture des pièges et la capacité à ne pas conclure trop vite.</div></div>
        <div class="goal"><h4>Effet final</h4><div>Fin plus visuelle, plus affirmée, plus “générique de fin” que sur V2.</div></div>
        <div class="goal"><h4>Suite</h4><div>Cette base peut encore être poussée, mais V4 renforce déjà clairement le ressenti cinématique.</div></div>
      </div>
      <div class="btns"><button class="btn-main" onclick="renderHome()">RETOUR ACCUEIL</button></div>
    </section>`;
}
function resizeRain(){ RAIN.width = innerWidth; RAIN.height = innerHeight; }
let drops=[];
function initRain(){ resizeRain(); drops = Array.from({length:180}, ()=>({x:Math.random()*RAIN.width,y:Math.random()*RAIN.height,l:10+Math.random()*18,v:6+Math.random()*8})); }
function drawRain(){
  CTX.clearRect(0,0,RAIN.width,RAIN.height);
  CTX.strokeStyle='rgba(114,204,255,.35)'; CTX.lineWidth=1; CTX.beginPath();
  for(const d of drops){ CTX.moveTo(d.x,d.y); CTX.lineTo(d.x-4,d.y+d.l); d.y+=d.v; d.x-=.6; if(d.y>RAIN.height||d.x<-20){d.x=Math.random()*RAIN.width+40; d.y=-20;} }
  CTX.stroke(); requestAnimationFrame(drawRain);
}
window.addEventListener('resize', resizeRain);
initRain(); drawRain(); renderHome();
</script>
</body>
</html>
